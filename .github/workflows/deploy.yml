name: Deploy to NAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared
          chmod +x /tmp/cloudflared

      - name: Deploy via Cloudflare Tunnel
        env:
          TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          sshpass -p "${{ secrets.NAS_PASS }}" scp -o StrictHostKeyChecking=no \
            index.html api.php test.php site.webmanifest habit-logo-achieve.* \
            ${{ secrets.NAS_USER }}@192.168.50.124:/volume1/web/habit/ 2>/dev/null || \
            echo "⚠️  Direct deploy failed (expected from outside LAN)"
          
          # Alternative: Deploy via Cloudflare Tunnel
          /tmp/cloudflared tunnel run --token "$TUNNEL_TOKEN" &
          sleep 3
          echo "Tunnel attempted"
