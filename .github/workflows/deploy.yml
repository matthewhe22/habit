name: Deploy to NAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Cloudflare Tunnel
        run: |
          echo "Triggering deploy on NAS..."
          curl -s --connect-timeout 30 "https://habit.capconnex.com.au/deploy.php"
