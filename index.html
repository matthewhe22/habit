// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  var kidsState = useState([]);
  var kids = kidsState[0]; var setKids = kidsState[1];
  var siState = useState({food:[],toys:[],home:[]});
  var shopItems = siState[0]; var setShopItems = siState[1];
  var pcState = useState({});
  var petCosts = pcState[0]; var setPetCosts = pcState[1];
  var pcfState = useState({patCost:1,playCost:2,restMinutes:10});
  var petConfig = pcfState[0]; var setPetConfig = pcfState[1];
  var rwState = useState([]);
  var rewards = rwState[0]; var setRewards = rwState[1];
  var rdState = useState([]);
  var redemptions = rdState[0]; var setRedemptions = rdState[1];
  var hpState = useState(false);
  var hasPin = hpState[0]; var setHasPin = hpState[1];
  var ldState = useState(true);
  var loading = ldState[0]; var setLoading = ldState[1];
  var siIdState = useState('');
  var selId = siIdState[0]; var setSelId = siIdState[1];
  var ktState = useState('home');
  var kidTab = ktState[0]; var setKidTab = ktState[1];
  var saState = useState(false);
  var showAdmin = saState[0]; var setShowAdmin = saState[1];
  var spmState = useState(false);
  var showPinModal = spmState[0]; var setSPM = spmState[1];
  var toastState = useState(null);
  var toast = toastState[0]; var setToast = toastState[1];
  var celebState = useState(new Set());
  var celebrating = celebState[0]; var setCelebr = celebState[1];
  var firstLoad = useRef(true);
  var isMobile = useIsMobile();

  // PIN persisted in sessionStorage
  var readStoredPin = function() { try { return sessionStorage.getItem('habitAdminPin')||''; } catch(e) { return ''; } };
  var vpState = useState(readStoredPin);
  var verifiedPin = vpState[0]; var setVPState = vpState[1];
  function setVerifiedPin(pin) {
    setVPState(pin);
    try { pin ? sessionStorage.setItem('habitAdminPin',pin) : sessionStorage.removeItem('habitAdminPin'); } catch(e) {}
  }

  var kid = kids.find(function(k){return k.id===selId;})||kids[0];
  var c   = C[kid && kid.color ? kid.color : 'blue']||C.blue;
  var petCatalogue = PET_SPECIES.map(function(p){
    var customCost = petCosts[p.id];
    return Object.assign({},p,{cost: customCost !== undefined ? customCost : p.cost});
  });
  var minCost = petCatalogue.length ? Math.min.apply(null, petCatalogue.map(function(p){return p.cost;})) : 10;

  function applyState(data) {
    if(!data||!data.kids) return;
    setKids(data.kids);
    setShopItems(data.shopItems);
    setPetCosts(data.petCosts);
    if(data.petConfig) setPetConfig(data.petConfig);
    if(data.rewards) setRewards(data.rewards);
    if(data.redemptions) setRedemptions(data.redemptions);
    setHasPin(data.hasPin);
  }

  function showToast(msg, type) {
    type = type || 'success';
    setToast({msg:msg,type:type});
    setTimeout(function(){setToast(null);}, type==='error'?4500:2500);
  }

  var loadState = useCallback(async function() {
    var data = await callAPI('state');
    if(data && data.error){ showToast('Could not connect to server','error'); setLoading(false); return; }
    applyState(data);
    if(firstLoad.current && data && data.kids && data.kids.length>0){ setSelId(data.kids[0].id); firstLoad.current=false; }
    setLoading(false);
  },[]);

  useEffect(function(){loadState();},[]);
  useEffect(function(){
    if(showAdmin) return;
    var t=setInterval(loadState,30000);
    return function(){clearInterval(t);};
  },[showAdmin,loadState]);

  // ── Handlers ──────────────────────────────────────────────────────────────────
  async function handleComplete(kidId, task) {
    var d=await callAPI('complete_task',{kidId:kidId,taskId:task.id,points:task.points});
    if(d && d.error){ showToast('Could not save — check connection','error'); return; }
    applyState(d);
    var kk=kids.find(function(k){return k.id===kidId;});
    var name = kk ? kk.name : '';
    showToast(name+': '+(task.points>0?'+':'')+task.points+' pts ⭐');
    if(task.points>0){
      setCelebr(function(p){var n=new Set(p);n.add(task.id);return n;});
      setTimeout(function(){setCelebr(function(p){var n=new Set(p);n.delete(task.id);return n;});},900);
    }
  }

  async function handleUndo(kidId, task) {
    var d=await callAPI('undo_task',{kidId:kidId,taskId:task.id,points:task.points});
    if(d && d.error){ showToast('Could not undo — check connection','error'); return; }
    applyState(d);
    showToast('Undone: '+task.title);
  }

  async function handleAdopt(pet, petName) {
    var customCost = petCosts[pet.id];
    var cost = customCost !== undefined ? customCost : pet.cost;
    var d=await callAPI('adopt_pet',{kidId:selId,speciesId:pet.id,cost:cost,petName:petName||null});
    if(d && d.error){ showToast(d.error||'Could not adopt','error'); return; }
    applyState(d);
    setKidTab('pet');
    var adoptedName=petName?'"'+petName+'"':pet.name;
    showToast((kid ? kid.name : '')+" adopted "+adoptedName+"! 🥚 Feed it to hatch!");
  }

  async function handleBuy(item) {
    var kidObj=kids.find(function(k){return k.id===selId;});
    if(!kidObj || !kidObj.pet) return;
    var sp=getSpecies(kidObj.pet.id);
    var isFood=shopItems.food.some(function(f){return f.id===item.id;});
    var isHome=(shopItems.home||[]).some(function(h){return h.id===item.id;});
    var isPref=isFood&&(sp.preferredFood||[]).includes(item.id);
    var growthGain=isFood?(isPref?item.moodBoost:Math.ceil(item.moodBoost/2)):Math.ceil(item.moodBoost/5);
    var d=await callAPI('buy_item',{kidId:selId,itemId:item.id,cost:item.cost,moodBoost:item.moodBoost,growthGain:growthGain});
    if(d && d.error){ showToast(d.error||'Could not buy','error'); return; }
    applyState(d);
    if(isHome) showToast(sp.name+' moved into: '+item.name+'! '+item.emoji+' Rest speed '+item.speedBonus+'×!');
    else showToast(sp.name+' loved the '+item.name+'! '+item.emoji+(isPref?' 💫 Fave!':''));
  }

  // Pat / play / rest — pet care actions (costs are parent-configurable)
  async function handlePetAction(kidObj, type){
    if(!kidObj.pet) return false;
    var d=await callAPI('pet_action',{kidId:kidObj.id,type:type});
    if(d && d.error){ showToast(d.error,'error'); return false; }
    applyState(d);
    var spName=getSpecies(kidObj.pet.id).name;
    if(type==='rest') showToast(spName+" is taking a nap! 💤");
    if(type==='play') showToast(spName+" had so much fun playing! ⚽");
    if(type==='bath') showToast(spName+" had a bath! All squeaky clean! 🛁");
    return true;
  }

  // Feed a specific kid's pet straight from the yard
  async function handleFeed(kidObj, item){
    if(!kidObj.pet) return false;
    if(kidObj.balance<item.cost){ showToast(kidObj.name+" needs more points to buy that!", 'error'); return false; }
    var sp=getSpecies(kidObj.pet.id);
    var isPref=(sp.preferredFood||[]).includes(item.id);
    var growthGain=isPref?item.moodBoost:Math.ceil(item.moodBoost/2);
    var d=await callAPI('buy_item',{kidId:kidObj.id,itemId:item.id,cost:item.cost,moodBoost:item.moodBoost,growthGain:growthGain});
    if(d && d.error){ showToast(d.error||'Could not feed','error'); return false; }
    applyState(d);
    var wasEgg=getStageInfo(sp,kidObj.pet.growthPoints||0).stageIdx===0;
    var nowInfo=getStageInfo(sp,(kidObj.pet.growthPoints||0)+growthGain);
    if(wasEgg&&nowInfo.stageIdx>0) showToast("🎉 The egg hatched! Say hi to "+kidObj.name+"'s "+nowInfo.stage.name+"!");
    else showToast(sp.name+' munched the '+item.name+'! '+item.emoji+(isPref?' 💫 Fave!':''));
    return true;
  }

  async function handleUpdatePetConfig(field, value){
    var body={pin:verifiedPin}; body[field]=value;
    var d=await callAPI('update_pet_config',body);
    if(d && d.error){showToast('Error saving pet care setting','error');return;} applyState(d);
  }

  async function handleUpdateKid(kidId,updates){
    var d=await callAPI('update_kid',{pin:verifiedPin,kidId:kidId,updates:updates});
    if(d && d.error){showToast('Error saving','error');return;} applyState(d);
  }
  async function handleAddKid(info){
    var d=await callAPI('add_kid',{pin:verifiedPin,name:info.name,emoji:info.emoji,color:info.color});
    if(d && d.error){showToast('Error adding kid','error');return;} applyState(d); showToast(info.emoji+' '+info.name+' added!');
  }
  async function handleDeleteKid(id){
    var d=await callAPI('delete_kid',{pin:verifiedPin,kidId:id});
    if(d && d.error){showToast('Error deleting kid','error');return;} applyState(d);
    if(selId===id){ var newKids = d && d.kids; setSelId(newKids && newKids[0] ? newKids[0].id : ''); }
  }
  async function handleSaveTask(kidId,taskData){
    var body = Object.assign({pin:verifiedPin,kidId:kidId},taskData);
    var d=await callAPI('save_task',body);
    if(d && d.error){showToast('Error saving task','error');return;} applyState(d);
  }
  async function handleDeleteTask(kidId,taskId){
    var d=await callAPI('delete_task',{pin:verifiedPin,kidId:kidId,taskId:taskId});
    if(d && d.error){showToast('Error deleting task','error');return;} applyState(d);
  }
  async function handleUpdateShop(itemId,field,value){
    var d=await callAPI('update_shop',{pin:verifiedPin,itemId:itemId,field:field,value:value});
    if(d && d.error){showToast('Error saving shop item','error');return;} applyState(d);
  }
  async function handleUpdatePetCost(speciesId,cost){
    var d=await callAPI('update_pet_cost',{pin:verifiedPin,speciesId:speciesId,cost:cost});
    if(d && d.error){showToast('Error saving pet cost','error');return;} applyState(d);
  }

  // Kid redeems points for a real-world reward (movie night, game time, …)
  async function handleRedeem(kidObj, reward){
    if(!kidObj) return;
    if(kidObj.balance<reward.cost){ showToast(kidObj.name+" needs more points for that!", 'error'); return; }
    var d=await callAPI('redeem_reward',{kidId:kidObj.id,rewardId:reward.id});
    if(d && d.error){ showToast(d.error||'Could not redeem','error'); return; }
    applyState(d);
    showToast("🎉 "+kidObj.name+" redeemed "+reward.emoji+" "+reward.name+"! Tell a parent.");
  }
  // Parent reward management
  async function handleAddReward(info){
    var d=await callAPI('add_reward',{pin:verifiedPin,name:info.name,emoji:info.emoji,cost:info.cost});
    if(d && d.error){showToast('Error adding reward','error');return;} applyState(d); showToast(info.emoji+' '+info.name+' added!');
  }
  async function handleUpdateReward(rewardId,field,value){
    var body={pin:verifiedPin,rewardId:rewardId}; body[field]=value;
    var d=await callAPI('update_reward',body);
    if(d && d.error){showToast('Error saving reward','error');return;} applyState(d);
  }
  async function handleDeleteReward(rewardId){
    var d=await callAPI('delete_reward',{pin:verifiedPin,rewardId:rewardId});
    if(d && d.error){showToast('Error deleting reward','error');return;} applyState(d);
  }
  async function handleDeleteRedemption(redemptionId){
    var d=await callAPI('delete_redemption',{pin:verifiedPin,redemptionId:redemptionId});
    if(d && d.error){showToast('Error clearing redemption','error');return;} applyState(d);
  }
  async function handleNewDay(){
    var d=await callAPI('new_day',{pin:verifiedPin});
    if(d && d.error){showToast('Error resetting day','error');return;} applyState(d); showToast("🌅 New day! Tasks reset for everyone.");
  }
  async function handleCopyTasks(fromKidId,toKidId){
    var fromKid=kids.find(function(k){return k.id===fromKidId;}); if(!fromKid) return;
    var lastData=null;
    var entries=Object.entries(fromKid.tasks);
    for(var ei=0;ei<entries.length;ei++){
      var cat=entries[ei][0], tasks=entries[ei][1];
      for(var ti=0;ti<tasks.length;ti++){
        var task=tasks[ti];
        lastData=await callAPI('save_task',{pin:verifiedPin,kidId:toKidId,category:cat,title:task.title,points:task.points,isNew:true});
      }
    }
    if(lastData) applyState(lastData);
    showToast('Tasks copied from '+fromKid.name+'!');
  }

  function openAdmin(){
    if(hasPin&&!verifiedPin){ setSPM(true); }
    else { setShowAdmin(true); }
  }

  if(loading) return (
    <div className="flex items-center justify-center min-h-screen">
      <div className="text-center">
        <div className="text-5xl mb-4 animate-bounce">🌟</div>
        <p className="text-gray-500 font-bold text-lg">Loading…</p>
      </div>
    </div>
  );

  var petMoodLow = kid && kid.pet && kid.pet.mood < 30;

  // Shared handlers — passed to whichever layout renders, so both run identical logic
  var H = {
    onComplete: handleComplete, onUndo: handleUndo, onAdopt: handleAdopt,
    onBuy: handleBuy, onAction: handlePetAction, onFeed: handleFeed,
    onRedeem: handleRedeem,
  };
  var layoutProps = {
    kids:kids, kid:kid, c:c, selId:selId, setSelId:setSelId,
    kidTab:kidTab, setKidTab:setKidTab, petMoodLow:petMoodLow,
    shopItems:shopItems, petCatalogue:petCatalogue, petConfig:petConfig,
    minCost:minCost, celebrating:celebrating, rewards:rewards,
    loadState:loadState, openAdmin:openAdmin, H:H,
  };

  return (
    <div>
      {/* Toast notification */}
      {toast&&(
        <div className={"app-toast fixed top-4 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-full shadow-2xl text-sm font-bold z-50 "+(toast.type==='error'?"bg-red-600":"bg-gray-800")+" text-white"}>
          {toast.msg}
        </div>
      )}

      {/* Modals (shared across both layouts) */}
      {showPinModal&&(
        <PinModal hasPin={hasPin}
          onVerified={function(pin){setVerifiedPin(pin);setSPM(false);setShowAdmin(true);}}
          onClose={function(){setSPM(false);}}/>
      )}
      {showAdmin&&(
        <AdminModal
          kids={kids} shopItems={shopItems} petCatalogue={petCatalogue} petConfig={petConfig}
          rewards={rewards} redemptions={redemptions}
          verifiedPin={verifiedPin} hasPin={hasPin}
          onUpdateKid={handleUpdateKid} onAddKid={handleAddKid} onDeleteKid={handleDeleteKid}
          onSaveTask={handleSaveTask} onDeleteTask={handleDeleteTask}
          onUpdateShop={handleUpdateShop} onUpdatePetCost={handleUpdatePetCost} onUpdatePetConfig={handleUpdatePetConfig}
          onAddReward={handleAddReward} onUpdateReward={handleUpdateReward} onDeleteReward={handleDeleteReward}
          onDeleteRedemption={handleDeleteRedemption}
          onNewDay={handleNewDay} onCopyTasks={handleCopyTasks}
          onComplete={handleComplete} onUndo={handleUndo}
          onChangePin={function(newPin){setVerifiedPin(newPin);}}
          onClose={function(){setShowAdmin(false);loadState();}}/>
      )}

      {/* Render the layout purpose-built for the device — both share the state above */}
      {isMobile ? <MobileLayout {...layoutProps}/> : <DesktopLayout {...layoutProps}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
